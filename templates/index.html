<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Analytics Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }
        p {
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .status {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        .status.error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Social Media Analytics Dashboard</h1>
        <p>Analyze sentiment and trends from tweets using advanced NLP and Machine Learning</p>
        
        <div id="status" class="status">
            Checking Flask application status...
        </div>
        
        <div>
            <a href="http://localhost:5000" class="btn" onclick="checkFlaskStatus(event)">
                🚀 Launch Dashboard
            </a>
            <a href="#" class="btn" onclick="startFlask(event)">
                🔧 Start Flask Server
            </a>
        </div>
        
        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e5e7eb;">
            <h3>Quick Access</h3>
            <div style="margin-top: 1rem;">
                <a href="http://localhost:5000/" class="btn" style="font-size: 0.9rem; padding: 0.5rem 1rem;">🏠 Home</a>
                <a href="http://localhost:5000/search" class="btn" style="font-size: 0.9rem; padding: 0.5rem 1rem;">🔍 Search</a>
                <a href="http://localhost:5000/comparison" class="btn" style="font-size: 0.9rem; padding: 0.5rem 1rem;">⚖️ Compare</a>
                <a href="http://localhost:5000/insights" class="btn" style="font-size: 0.9rem; padding: 0.5rem 1rem;">💡 Insights</a>
            </div>
        </div>
    </div>

    <script>
        // Check Flask server status
        async function checkFlaskStatus(event) {
            if (event) event.preventDefault();
            
            const status = document.getElementById('status');
            status.textContent = 'Checking Flask server...';
            status.className = 'status';
            
            try {
                const response = await fetch('http://localhost:5000/', {
                    mode: 'no-cors',
                    signal: AbortSignal.timeout(3000)
                });
                
                status.textContent = '✅ Flask server is running! Redirecting...';
                status.className = 'status';
                
                setTimeout(() => {
                    window.location.href = 'http://localhost:5000';
                }, 1000);
                
            } catch (error) {
                status.textContent = '❌ Flask server is not running. Please start the server first.';
                status.className = 'status error';
            }
        }
        
        // Start Flask server (this would need backend implementation)
        function startFlask(event) {
            if (event) event.preventDefault();
            
            const status = document.getElementById('status');
            status.innerHTML = `
                <strong>📋 To start Flask server:</strong><br>
                1. Open terminal/command prompt<br>
                2. Navigate to: e:\\NLP mini project\\Trend-Analysis-NLP<br>
                3. Run: python app.py<br>
                4. Then click "Launch Dashboard" above
            `;
            status.className = 'status';
        }
        
        // Auto-check status on page load
        window.addEventListener('load', () => {
            setTimeout(checkFlaskStatus, 1000);
        });
    </script>
</body>
</html>
